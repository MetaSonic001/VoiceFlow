{% extends "base_dashboard.html" %}{% block title %}Reports — VoiceFlow AI{% endblock %}
{% block content %}
<div x-data="reportsApp()" class="space-y-6">
<div class="mb-8"><h1 class="text-2xl font-bold">Reports</h1><p class="text-gray-500 text-sm mt-1">Generate and download reports</p></div>
<div class="grid md:grid-cols-3 gap-6 mb-8">
  <template x-for="r in reports" :key="r.name || r.id">
    <div class="bg-white rounded-xl border p-5">
      <div class="font-semibold mb-1" x-text="r.name"></div>
      <div class="text-xs text-gray-400 mb-3" x-text="(r.type || 'Summary') + ' • ' + (r.created_at || r.createdAt || 'N/A')"></div>
      <button @click="downloadReport(r)" class="text-sm text-blue-600 hover:underline">Download</button>
    </div>
  </template>
  <div x-show="reports.length===0" class="col-span-3 text-center py-8 text-gray-400 bg-white rounded-xl border">No reports generated yet.</div>
</div>
<div class="bg-white rounded-xl border p-6">
  <h3 class="font-semibold mb-4">Generate Report</h3>
  <div class="flex gap-4 items-end flex-wrap">
    <div><label class="block text-xs text-gray-500 mb-1">Type</label><select x-model="reportType" class="border rounded-lg px-3 py-2 text-sm"><option>Analytics Summary</option><option>Call Logs</option><option>Agent Performance</option></select></div>
    <div><label class="block text-xs text-gray-500 mb-1">Period</label><select x-model="reportPeriod" class="border rounded-lg px-3 py-2 text-sm"><option value="7d">Last 7 days</option><option value="30d">Last 30 days</option><option value="90d">Last 90 days</option></select></div>
    <button @click="generateReport()" :disabled="generating" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 disabled:opacity-50" x-text="generating ? 'Generating…' : 'Generate'"></button>
  </div>
</div>
</div>

<script>
function reportsApp() {
  return {
    reports: {{ reports|safe }},
    reportType: 'Analytics Summary',
    reportPeriod: '7d',
    generating: false,

    async generateReport() {
      this.generating = true;
      try {
        const data = await apiFetch('/admin/pipelines', {method:'POST', json:{
          name: this.reportType + ' — ' + this.reportPeriod,
          type: this.reportType.toLowerCase().replace(/ /g, '_'),
          period: this.reportPeriod,
        }});
        showToast('Report generated', 'success');
        // Add to list
        this.reports.unshift({
          name: this.reportType + ' — ' + this.reportPeriod,
          type: this.reportType,
          created_at: new Date().toLocaleDateString(),
          id: data.pipeline?.id || data.id || '',
        });
      } catch(e) { showToast('Failed to generate report', 'error'); }
      this.generating = false;
    },

    downloadReport(r) {
      // Build a simple CSV export of the report data
      const lines = ['Report: ' + r.name, 'Type: ' + (r.type||'Summary'), 'Generated: ' + (r.created_at||r.createdAt||'N/A'), '', 'Status: Complete'];
      const blob = new Blob([lines.join('\n')], {type:'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (r.name || 'report').replace(/\s+/g,'_') + '.csv';
      a.click();
      URL.revokeObjectURL(url);
    }
  };
}
</script>
{% endblock %}
