{% extends "base_dashboard.html" %}{% block title %}Reports — VoiceFlow AI{% endblock %}
{% block content %}
<div x-data="reportsApp()" class="space-y-6 fade-in-up">
<div class="mb-8"><h1 class="text-3xl font-bold vf-heading bg-gradient-to-r from-gray-900 via-gray-700 to-gray-900 dark:from-white dark:via-gray-200 dark:to-white bg-clip-text text-transparent">Reports</h1><p class="text-slate-500 dark:text-gray-400 text-sm mt-1">Generate and download analytics exports for your team.</p></div>
<div class="grid md:grid-cols-3 gap-6 mb-8 stagger">
  <template x-for="r in reports" :key="r.name || r.id">
    <div class="vf-card p-5">
      <div class="font-semibold mb-1" x-text="r.name"></div>
      <div class="text-xs text-slate-400 dark:text-gray-500 mb-3" x-text="(r.type || 'Summary') + ' • ' + (r.created_at || r.createdAt || 'N/A')"></div>
      <button @click="downloadReport(r)" class="vf-btn text-sm text-teal-600 dark:text-teal-400 hover:underline">Download</button>
    </div>
  </template>
  <div x-show="reports.length===0" class="col-span-3 text-center py-8 text-slate-400 dark:text-gray-500 vf-card">No reports generated yet.</div>
</div>
<div class="vf-card p-6">
  <h3 class="font-semibold mb-4 dark:text-white">Generate Report</h3>
  <div class="flex gap-4 items-end flex-wrap">
    <div><label class="block text-xs text-slate-500 dark:text-gray-400 mb-1">Type</label><select x-model="reportType" class="vf-input border border-slate-200 dark:border-gray-700/50 rounded-lg px-3 py-2 text-sm"><option>Analytics Summary</option><option>Call Logs</option><option>Agent Performance</option></select></div>
    <div><label class="block text-xs text-slate-500 dark:text-gray-400 mb-1">Period</label><select x-model="reportPeriod" class="vf-input border border-slate-200 dark:border-gray-700/50 rounded-lg px-3 py-2 text-sm"><option value="7d">Last 7 days</option><option value="30d">Last 30 days</option><option value="90d">Last 90 days</option></select></div>
    <button @click="generateReport()" :disabled="generating" class="vf-btn bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-lg shadow-teal-500/25 hover:from-teal-600 hover:to-cyan-600 px-4 py-2 rounded-lg text-sm disabled:opacity-50" x-text="generating ? 'Generating…' : 'Generate'"></button>
  </div>
</div>
</div>

<script>
function reportsApp() {
  return {
    reports: {{ reports|safe }},
    reportType: 'Analytics Summary',
    reportPeriod: '7d',
    generating: false,

    async generateReport() {
      this.generating = true;
      try {
        const data = await apiFetch('/api/reports/', {method:'POST', json:{
          name: this.reportType + ' — ' + this.reportPeriod,
          type: this.reportType.toLowerCase().replace(/ /g, '_'),
          period: this.reportPeriod,
        }});
        showToast('Report generated', 'success');
        // Add to list
        this.reports.unshift({
          name: this.reportType + ' — ' + this.reportPeriod,
          type: this.reportType,
          created_at: new Date().toLocaleDateString(),
          id: data.pipeline?.id || data.id || '',
        });
      } catch(e) { showToast('Failed to generate report', 'error'); }
      this.generating = false;
    },

    async downloadReport(r) {
      // Fetch real data based on report type and build CSV
      const type = (r.type || r.name || '').toLowerCase();
      let csvRows = [];
      try {
        if (type.includes('call')) {
          const data = await apiFetch('/api/call-logs/');
          const logs = data.logs || data.callLogs || [];
          csvRows.push(['ID','Agent','Caller','Duration','Rating','Status','Created At']);
          logs.forEach(l => csvRows.push([l.id||'', l.agentName||l.agentId||'', l.callerNumber||l.caller||'', l.duration||'', l.rating||'', l.status||'', l.createdAt||l.created_at||'']));
        } else if (type.includes('agent')) {
          const data = await apiFetch('/api/agents/');
          const agents = data.agents || [];
          csvRows.push(['ID','Name','Status','Model','Calls','Avg Rating','Created At']);
          agents.forEach(a => csvRows.push([a.id||'', a.name||'', a.status||'', a.model||'', a.callCount||a._count?.calls||0, a.avgRating||'', a.createdAt||a.created_at||'']));
        } else {
          const data = await apiFetch('/api/analytics/overview/');
          csvRows.push(['Metric','Value']);
          Object.entries(data).forEach(([k,v]) => {
            if (typeof v !== 'object') csvRows.push([k, v]);
          });
          if (data.metrics) Object.entries(data.metrics).forEach(([k,v]) => csvRows.push([k, v]));
        }
      } catch(e) {
        csvRows = [['Error'], ['Could not fetch data: ' + e.message]];
      }
      if (csvRows.length <= 1) csvRows.push(['No data available']);
      const csv = csvRows.map(row => row.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
      const blob = new Blob([csv], {type:'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (r.name || 'report').replace(/\s+/g,'_') + '.csv';
      a.click();
      URL.revokeObjectURL(url);
    }
  };
}
</script>
{% endblock %}
