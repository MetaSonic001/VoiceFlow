{% extends "base_dashboard.html" %}{% block title %}Pipelines — VoiceFlow AI{% endblock %}
{% block content %}
<div x-data="pipelinesApp()" class="fade-in-up">
  <div class="mb-8 flex items-center justify-between">
    <div><h1 class="text-2xl font-bold bg-gradient-to-r from-gray-900 via-gray-700 to-gray-900 dark:from-white dark:via-gray-200 dark:to-white bg-clip-text text-transparent">Pipelines</h1><p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Automation workflows for your agents</p></div>
    <button @click="showDialog=true" class="vf-btn bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-lg shadow-teal-500/25 hover:from-teal-600 hover:to-cyan-600 px-4 py-2 rounded-lg text-sm">+ New Pipeline</button>
  </div>
  <template x-for="p in pipelines" :key="p.id">
    <div class="vf-card p-5 mb-4 flex items-center justify-between">
      <div><span class="font-semibold dark:text-white" x-text="p.name"></span><span class="text-xs text-gray-400 dark:text-gray-500 ml-2" x-text="(p.stages||[]).length + ' stages'"></span></div>
      <div class="flex gap-2">
        <span class="text-xs px-2 py-1 rounded-full" :class="p.status==='active'?'vf-badge-success':'vf-badge-neutral'" x-text="p.status || 'idle'"></span>
        <button @click="triggerPipeline(p)" class="vf-btn px-3 py-1 border dark:border-gray-700/50 rounded text-xs hover:bg-gray-50 dark:hover:bg-gray-800 dark:text-gray-300">Run</button>
      </div>
    </div>
  </template>
  <div x-show="pipelines.length===0" class="vf-card p-16 text-center"><div class="text-gray-300 dark:text-gray-600 text-5xl mb-4">&#9889;</div><div class="text-gray-400 dark:text-gray-500">No pipelines yet.</div><div class="text-sm text-gray-400 dark:text-gray-500 mt-1">Create your first automation pipeline.</div></div>

  <!-- Create dialog -->
  <div x-show="showDialog" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/40" @click.self="showDialog=false">
    <div class="bg-white dark:bg-gray-900 rounded-2xl p-6 w-full max-w-md shadow-xl dark:border dark:border-gray-700/50">
      <h3 class="font-semibold mb-4 dark:text-white">Create Pipeline</h3>
      <div class="space-y-3">
        <div><label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Name</label><input x-model="newName" type="text" class="vf-input w-full border dark:border-gray-700/50 rounded-lg px-3 py-2 text-sm" placeholder="My Pipeline"></div>
        <div><label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Trigger</label><select x-model="newTrigger" class="vf-input w-full border dark:border-gray-700/50 rounded-lg px-3 py-2 text-sm"><option>On new conversation</option><option>On agent response</option><option>Scheduled</option></select></div>
      </div>
      <div class="flex justify-end gap-2 mt-6">
        <button @click="showDialog=false" class="vf-btn px-4 py-2 border dark:border-gray-700/50 rounded-lg text-sm hover:bg-gray-50 dark:hover:bg-gray-800 dark:text-gray-300">Cancel</button>
        <button @click="createPipeline()" class="vf-btn bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-lg shadow-teal-500/25 hover:from-teal-600 hover:to-cyan-600 px-4 py-2 rounded-lg text-sm">Create</button>
      </div>
    </div>
  </div>
</div>
<script>
function pipelinesApp() {
  return {
    pipelines: {{ pipelines|safe }},
    showDialog: false,
    newName: '',
    newTrigger: 'On new conversation',
    async createPipeline() {
      if (!this.newName.trim()) { showToast('Name required','error'); return; }
      try {
        const d = await apiFetch('/api/pipelines/', {method:'POST', json:{name:this.newName, stages:[{trigger:this.newTrigger}]}});
        this.pipelines.unshift(d);
        this.showDialog = false;
        this.newName = '';
        showToast('Pipeline created');
      } catch(e) { showToast('Failed','error'); }
    },
    async triggerPipeline(p) {
      try {
        await apiFetch('/api/pipelines/trigger/', {method:'POST', json:{pipeline_id:p.id}});
        p.status = 'running';
        showToast('Pipeline triggered');
      } catch(e) { showToast('Trigger failed','error'); }
    }
  }
}
</script>
{% endblock %}
