{% extends "base_dashboard.html" %}
{% block title %}Call Logs — VoiceFlow AI{% endblock %}
{% block content %}
<div x-data="callsApp()" class="fade-in-up">
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-2xl font-bold bg-gradient-to-r from-gray-900 via-gray-700 to-gray-900 dark:from-white dark:via-gray-200 dark:to-white bg-clip-text text-transparent">Call Logs</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Review conversation transcripts and ratings</p>
    </div>
  </div>
  <div class="vf-card">
    <div class="p-4 border-b dark:border-gray-700/50 flex gap-3">
      <input type="text" placeholder="Search calls..." class="vf-input flex-1" x-model="search" @input.debounce.300ms="filterLogs()">
    </div>
    <table class="w-full text-sm">
      <thead class="bg-gray-50/80 dark:bg-gray-800/50"><tr class="text-left text-gray-500 dark:text-gray-400"><th class="px-4 py-3">Agent</th><th class="px-4 py-3">Type</th><th class="px-4 py-3">Duration</th><th class="px-4 py-3">Status</th><th class="px-4 py-3">Time</th><th class="px-4 py-3">Recording</th><th class="px-4 py-3">Actions</th></tr></thead>
      <tbody>
        <template x-for="log in filteredLogs" :key="log.id">
          <tr class="border-t dark:border-gray-700/50 hover:bg-gray-50/50 dark:hover:bg-gray-800/30 transition-colors">
            <td class="px-4 py-3 font-medium dark:text-white" x-text="log.agentName || 'Agent'"></td>
            <td class="px-4 py-3"><span :class="log.type==='phone' ? 'vf-badge-info' : 'vf-badge-success'" x-text="log.type || 'chat'"></span></td>
            <td class="px-4 py-3 dark:text-gray-300" x-text="formatDuration(log.durationSeconds || log.duration || 0)"></td>
            <td class="px-4 py-3"><span :class="log.flaggedForRetraining ? 'vf-badge-warning' : 'vf-badge-success'" x-text="log.flaggedForRetraining ? 'flagged' : (log.status || 'completed')"></span></td>
            <td class="px-4 py-3 text-gray-500 dark:text-gray-400" x-text="log.startedAt ? new Date(log.startedAt).toLocaleString() : (log.startTime || '—')"></td>
            <td class="px-4 py-3">
              <template x-if="log.analysis && log.analysis.recording_url">
                <div class="space-y-1">
                  <audio controls class="h-7 w-48" :src="log.analysis.recording_url"></audio>
                  <a :href="log.analysis.recording_url" target="_blank" class="text-xs text-teal-600 hover:text-teal-700 dark:text-teal-400 dark:hover:text-teal-300 hover:underline block">Download</a>
                </div>
              </template>
              <template x-if="!(log.analysis && log.analysis.recording_url)">
                <span class="text-gray-300 dark:text-gray-600 text-xs">—</span>
              </template>
            </td>
            <td class="px-4 py-3">
              <button class="vf-btn text-teal-600 hover:text-teal-700 dark:text-teal-400 dark:hover:text-teal-300 text-xs" @click="flagLog(log)" x-text="log.flaggedForRetraining ? 'Flagged' : 'Flag'" :disabled="log.flaggedForRetraining" :class="log.flaggedForRetraining ? 'opacity-50 cursor-default' : ''"></button>
            </td>
          </tr>
        </template>
        <tr x-show="filteredLogs.length===0">
          <td colspan="7" class="px-4 py-16 text-center">
            <div class="flex flex-col items-center gap-3">
              <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-teal-100 to-cyan-100 dark:from-teal-900/30 dark:to-cyan-900/30 flex items-center justify-center">
                <svg class="w-8 h-8 text-teal-500 dark:text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              </div>
              <p class="text-gray-400 dark:text-gray-500">No call logs yet. Conversations will appear here.</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script>
function callsApp() {
  return {
    logs: {{ logs|safe }},
    search: '',
    get filteredLogs() {
      if (!this.search) return this.logs;
      const s = this.search.toLowerCase();
      return this.logs.filter(l => (l.agentName||'').toLowerCase().includes(s) || (l.type||'').includes(s) || (l.userQuery||'').toLowerCase().includes(s));
    },
    formatDuration(sec) {
      if (!sec) return '—';
      const m = Math.floor(sec / 60), s = sec % 60;
      return m > 0 ? m + 'm ' + s + 's' : s + 's';
    },
    async flagLog(log) {
      try {
        await apiFetch('/api/call-logs/' + log.id + '/flag/', {method:'POST'});
        log.flaggedForRetraining = true;
        showToast('Flagged for retraining');
      } catch(e) { showToast('Flag failed', 'error'); }
    }
  }
}
</script>
{% endblock %}
