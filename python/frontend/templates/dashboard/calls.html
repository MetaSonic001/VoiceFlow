{% extends "base_dashboard.html" %}
{% block title %}Call Logs — VoiceFlow AI{% endblock %}
{% block content %}
<div x-data="callsApp()">
  <div class="flex items-center justify-between mb-8">
    <div><h1 class="text-2xl font-bold">Call Logs</h1><p class="text-gray-500 text-sm mt-1">Review conversation transcripts and ratings</p></div>
  </div>
  <div class="bg-white rounded-xl border">
    <div class="p-4 border-b flex gap-3">
      <input type="text" placeholder="Search calls..." class="px-4 py-2 border rounded-lg text-sm flex-1 outline-none focus:ring-2 focus:ring-blue-500" x-model="search" @input.debounce.300ms="filterLogs()">
    </div>
    <table class="w-full text-sm">
      <thead class="bg-gray-50"><tr class="text-left text-gray-500"><th class="px-4 py-3">Agent</th><th class="px-4 py-3">Type</th><th class="px-4 py-3">Duration</th><th class="px-4 py-3">Status</th><th class="px-4 py-3">Time</th><th class="px-4 py-3">Actions</th></tr></thead>
      <tbody>
        <template x-for="log in filteredLogs" :key="log.id">
          <tr class="border-t hover:bg-gray-50">
            <td class="px-4 py-3 font-medium" x-text="log.agentName || 'Agent'"></td>
            <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs" :class="log.type==='phone' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'" x-text="log.type || 'chat'"></span></td>
            <td class="px-4 py-3" x-text="formatDuration(log.durationSeconds || log.duration || 0)"></td>
            <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs" :class="log.flaggedForRetraining ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700'" x-text="log.flaggedForRetraining ? 'flagged' : (log.status || 'completed')"></span></td>
            <td class="px-4 py-3 text-gray-500" x-text="log.startedAt ? new Date(log.startedAt).toLocaleString() : (log.startTime || '—')"></td>
            <td class="px-4 py-3">
              <button class="text-blue-600 hover:underline text-xs" @click="flagLog(log)" x-text="log.flaggedForRetraining ? 'Flagged' : 'Flag'" :disabled="log.flaggedForRetraining" :class="log.flaggedForRetraining ? 'opacity-50 cursor-default' : ''"></button>
            </td>
          </tr>
        </template>
        <tr x-show="filteredLogs.length===0"><td colspan="6" class="px-4 py-12 text-center text-gray-400">No call logs yet. Conversations will appear here.</td></tr>
      </tbody>
    </table>
  </div>
</div>
<script>
function callsApp() {
  return {
    logs: {{ logs|safe }},
    search: '',
    get filteredLogs() {
      if (!this.search) return this.logs;
      const s = this.search.toLowerCase();
      return this.logs.filter(l => (l.agentName||'').toLowerCase().includes(s) || (l.type||'').includes(s) || (l.userQuery||'').toLowerCase().includes(s));
    },
    formatDuration(sec) {
      if (!sec) return '—';
      const m = Math.floor(sec / 60), s = sec % 60;
      return m > 0 ? m + 'm ' + s + 's' : s + 's';
    },
    async flagLog(log) {
      try {
        await apiFetch('/api/call-logs/' + log.id + '/flag/', {method:'POST'});
        log.flaggedForRetraining = true;
        showToast('Flagged for retraining');
      } catch(e) { showToast('Flag failed', 'error'); }
    }
  }
}
</script>
{% endblock %}
