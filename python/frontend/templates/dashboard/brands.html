{% extends "base_dashboard.html" %}{% block title %}Brands — VoiceFlow AI{% endblock %}
{% block content %}
<div x-data="brandsApp()" class="space-y-6">
<div class="mb-8">
  <div class="flex items-center justify-between">
    <div><h1 class="text-2xl font-bold">Brands</h1><p class="text-gray-500 text-sm mt-1">Manage brand voices, topics, and policy rules</p></div>
    <button @click="openCreate()" class="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      New Brand
    </button>
  </div>
</div>

<!-- Brands Grid -->
<div x-show="brands.length === 0 && !loading" class="text-center py-16 bg-white rounded-xl border">
  <svg class="w-12 h-12 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>
  <p class="text-gray-500">No brands yet. Create your first brand to define voice and policy rules.</p>
</div>

<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
  <template x-for="b in brands" :key="b.id">
    <div class="bg-white rounded-xl border p-5 flex flex-col">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold text-lg" x-text="b.name"></h3>
        <div class="flex gap-1">
          <button @click="openEdit(b)" class="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          </button>
          <button @click="deleteBrand(b.id)" class="p-1.5 rounded-lg hover:bg-red-50 text-gray-400 hover:text-red-600">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>
        </div>
      </div>
      <div x-show="b.brandVoice" class="mb-3">
        <div class="text-xs text-gray-400 uppercase font-medium mb-1">Brand Voice</div>
        <p class="text-sm text-gray-600 line-clamp-2" x-text="b.brandVoice"></p>
      </div>
      <div class="flex flex-wrap gap-1.5 mb-3">
        <template x-for="t in (b.allowedTopics||[]).slice(0,3)" :key="t">
          <span class="px-2 py-0.5 bg-green-50 text-green-700 text-xs rounded-full" x-text="t"></span>
        </template>
        <template x-for="t in (b.restrictedTopics||[]).slice(0,3)" :key="t">
          <span class="px-2 py-0.5 bg-red-50 text-red-700 text-xs rounded-full" x-text="t"></span>
        </template>
      </div>
      <div class="mt-auto pt-3 border-t flex items-center justify-between text-xs text-gray-400">
        <span x-text="(b._count?.agents || 0) + ' agent' + ((b._count?.agents||0)===1?'':'s')"></span>
        <span x-text="b.createdAt ? new Date(b.createdAt).toLocaleDateString() : ''"></span>
      </div>
    </div>
  </template>
</div>

<!-- Modal -->
<div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/30" @click.self="showModal=false">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6 space-y-4" @click.stop>
    <h2 class="text-lg font-bold" x-text="editing ? 'Edit Brand' : 'Create Brand'"></h2>
    <div>
      <label class="text-sm font-medium text-gray-700">Name</label>
      <input type="text" x-model="form.name" class="w-full mt-1 px-4 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. Friendly Support">
    </div>
    <div>
      <label class="text-sm font-medium text-gray-700">Brand Voice</label>
      <textarea x-model="form.brandVoice" rows="3" class="w-full mt-1 px-4 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="Describe the tone and style…"></textarea>
    </div>
    <div>
      <label class="text-sm font-medium text-gray-700">Allowed Topics <span class="text-gray-400 font-normal">(comma-separated)</span></label>
      <input type="text" x-model="form.allowedTopicsRaw" class="w-full mt-1 px-4 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="billing, support, pricing">
    </div>
    <div>
      <label class="text-sm font-medium text-gray-700">Restricted Topics <span class="text-gray-400 font-normal">(comma-separated)</span></label>
      <input type="text" x-model="form.restrictedTopicsRaw" class="w-full mt-1 px-4 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="competitors, internal ops">
    </div>
    <div>
      <label class="text-sm font-medium text-gray-700">Policy Rules <span class="text-gray-400 font-normal">(one per line)</span></label>
      <textarea x-model="form.policyRulesRaw" rows="3" class="w-full mt-1 px-4 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="Always apologize for delays&#10;Never promise refunds"></textarea>
    </div>
    <div class="flex justify-end gap-3 pt-2">
      <button @click="showModal=false" class="px-4 py-2 border rounded-lg text-sm">Cancel</button>
      <button @click="saveBrand()" :disabled="saving" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 disabled:opacity-50" x-text="saving ? 'Saving…' : (editing ? 'Update' : 'Create')"></button>
    </div>
  </div>
</div>
</div>

<script>
function brandsApp() {
  return {
    brands: {{ brands|safe }},
    loading: false,
    showModal: false,
    editing: null,
    saving: false,
    form: { name: '', brandVoice: '', allowedTopicsRaw: '', restrictedTopicsRaw: '', policyRulesRaw: '' },

    openCreate() {
      this.editing = null;
      this.form = { name: '', brandVoice: '', allowedTopicsRaw: '', restrictedTopicsRaw: '', policyRulesRaw: '' };
      this.showModal = true;
    },

    openEdit(b) {
      this.editing = b.id;
      this.form = {
        name: b.name || '',
        brandVoice: b.brandVoice || '',
        allowedTopicsRaw: (b.allowedTopics || []).join(', '),
        restrictedTopicsRaw: (b.restrictedTopics || []).join(', '),
        policyRulesRaw: (b.policyRules || []).join('\n'),
      };
      this.showModal = true;
    },

    _parseList(raw) {
      return raw.split(',').map(s => s.trim()).filter(Boolean);
    },

    _parseLines(raw) {
      return raw.split('\n').map(s => s.trim()).filter(Boolean);
    },

    async saveBrand() {
      if (!this.form.name.trim()) { showToast('Name is required', 'error'); return; }
      this.saving = true;
      const payload = {
        name: this.form.name.trim(),
        brandVoice: this.form.brandVoice.trim(),
        allowedTopics: this._parseList(this.form.allowedTopicsRaw),
        restrictedTopics: this._parseList(this.form.restrictedTopicsRaw),
        policyRules: this._parseLines(this.form.policyRulesRaw),
      };
      try {
        if (this.editing) {
          const updated = await apiFetch('/api/brands/' + this.editing + '/', { method: 'PUT', json: payload });
          const idx = this.brands.findIndex(b => b.id === this.editing);
          if (idx >= 0) this.brands[idx] = updated;
          showToast('Brand updated', 'success');
        } else {
          const created = await apiFetch('/api/brands/', { method: 'POST', json: payload });
          this.brands.unshift(created);
          showToast('Brand created', 'success');
        }
        this.showModal = false;
      } catch(e) { showToast('Failed to save brand', 'error'); }
      this.saving = false;
    },

    async deleteBrand(id) {
      if (!confirm('Delete this brand?')) return;
      try {
        await apiFetch('/api/brands/' + id + '/', { method: 'DELETE' });
        this.brands = this.brands.filter(b => b.id !== id);
        showToast('Brand deleted', 'success');
      } catch(e) { showToast('Failed to delete', 'error'); }
    },
  };
}
</script>
{% endblock %}
