{% extends "base_dashboard.html" %}
{% block title %}A/B Testing — VoiceFlow AI{% endblock %}

{% block content %}
<div x-data="abTestingApp()" x-init="init()" class="space-y-6 fade-in">

  <!-- Header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold vf-heading bg-gradient-to-r from-slate-900 to-slate-600 dark:from-slate-100 dark:to-slate-400 bg-clip-text text-transparent">A/B Testing</h1>
      <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Compare agent variants and auto-promote winners.</p>
    </div>
    <button @click="showCreate=true"
            class="vf-btn px-5 py-2.5 bg-gradient-to-r from-teal-600 to-cyan-600 text-white text-sm font-medium rounded-xl">
      <span class="flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        New Test
      </span>
    </button>
  </div>

  <!-- Create Test Modal -->
  <div x-show="showCreate" x-cloak @click.self="showCreate=false"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
    <div x-show="showCreate"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95 translate-y-4"
         x-transition:enter-end="opacity-100 scale-100 translate-y-0"
         class="vf-card-static max-w-lg w-full p-6 dark:bg-slate-800">
      <h3 class="text-lg font-bold mb-4 vf-heading">Create A/B Test</h3>
      <form @submit.prevent="createTest()" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1">Base Agent</label>
          <select x-model="form.agentId" required class="vf-input w-full">
            <option value="">Select agent to test…</option>
            <template x-for="ag in agents" :key="ag.id">
              <option :value="ag.id" x-text="ag.name"></option>
            </template>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1">Variant Change</label>
          <select x-model="form.changeType" class="vf-input w-full">
            <option value="prompt">System Prompt</option>
            <option value="voice">Voice ID</option>
            <option value="model">LLM Model</option>
            <option value="temperature">Temperature</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1">New Value</label>
          <input x-model="form.newValue" required placeholder="Enter variant value..." class="vf-input w-full">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1">Traffic Split</label>
          <div class="flex items-center gap-3">
            <input type="range" x-model="form.split" min="10" max="90" step="10" class="flex-1 accent-teal-500">
            <span class="text-sm font-mono text-slate-600 dark:text-slate-300 w-20 text-right" x-text="form.split+'% / '+(100-form.split)+'%'"></span>
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="vf-btn flex-1 py-2.5 bg-gradient-to-r from-teal-600 to-cyan-600 text-white rounded-xl text-sm font-medium">
            Create Variant
          </button>
          <button type="button" @click="showCreate=false"
                  class="flex-1 py-2.5 border border-slate-200 dark:border-slate-600 rounded-xl text-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Active Tests -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 stagger">
    <template x-for="test in tests" :key="test.id">
      <div class="vf-card p-5 space-y-4">
        <!-- Header -->
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center shadow-lg shadow-violet-500/20">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
            </div>
            <div>
              <h3 class="font-semibold text-sm" x-text="test.name || 'Test #' + test.id.slice(0,6)"></h3>
              <p class="text-xs text-slate-500" x-text="test.changeType + ' variant'"></p>
            </div>
          </div>
          <span class="vf-badge" :class="{
            'vf-badge-success': test.status === 'completed',
            'vf-badge-info': test.status === 'running',
            'vf-badge-neutral': test.status === 'draft'
          }" x-text="test.status"></span>
        </div>

        <!-- Comparison bars -->
        <div class="space-y-3">
          <div>
            <div class="flex justify-between text-xs mb-1">
              <span class="font-medium text-blue-600">Variant A (Original)</span>
              <span class="text-slate-500" x-text="(test.variantA?.conversionRate || 0).toFixed(1) + '%'"></span>
            </div>
            <div class="h-2 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
              <div class="h-full bg-gradient-to-r from-blue-500 to-blue-400 rounded-full transition-all duration-700"
                   :style="'width:' + (test.variantA?.conversionRate || 0) + '%'"></div>
            </div>
          </div>
          <div>
            <div class="flex justify-between text-xs mb-1">
              <span class="font-medium text-violet-600">Variant B (Modified)</span>
              <span class="text-slate-500" x-text="(test.variantB?.conversionRate || 0).toFixed(1) + '%'"></span>
            </div>
            <div class="h-2 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
              <div class="h-full bg-gradient-to-r from-violet-500 to-purple-400 rounded-full transition-all duration-700"
                   :style="'width:' + (test.variantB?.conversionRate || 0) + '%'"></div>
            </div>
          </div>
        </div>

        <!-- Stats row -->
        <div class="grid grid-cols-3 gap-3 pt-2 border-t border-slate-100 dark:border-slate-700">
          <div class="text-center">
            <p class="text-lg font-bold text-slate-800 dark:text-slate-200" x-text="test.totalCalls || 0"></p>
            <p class="text-[10px] text-slate-500 uppercase tracking-wide">Total Calls</p>
          </div>
          <div class="text-center">
            <p class="text-lg font-bold" :class="(test.variantB?.conversionRate || 0) > (test.variantA?.conversionRate || 0) ? 'text-green-600' : 'text-slate-600'"
               x-text="((test.variantB?.conversionRate || 0) - (test.variantA?.conversionRate || 0)).toFixed(1) + '%'"></p>
            <p class="text-[10px] text-slate-500 uppercase tracking-wide">Lift</p>
          </div>
          <div class="text-center">
            <p class="text-lg font-bold text-slate-800 dark:text-slate-200" x-text="test.confidence ? test.confidence + '%' : '–'"></p>
            <p class="text-[10px] text-slate-500 uppercase tracking-wide">Confidence</p>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Empty State -->
  <template x-if="!loading && tests.length === 0">
    <div class="vf-card-static p-12 text-center fade-in-up">
      <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-violet-100 to-purple-100 dark:from-violet-900/30 dark:to-purple-900/30 flex items-center justify-center">
        <svg class="w-8 h-8 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
      </div>
      <h3 class="text-lg font-semibold text-slate-700 dark:text-slate-200 mb-1">No A/B Tests</h3>
      <p class="text-sm text-slate-500 mb-4">Create your first test to compare agent variants and find what works best.</p>
      <button @click="showCreate=true" class="vf-btn px-5 py-2 bg-gradient-to-r from-violet-600 to-purple-600 text-white text-sm rounded-xl">
        Create First Test
      </button>
    </div>
  </template>
</div>

<script>
function abTestingApp() {
  return {
    tests: [],
    agents: [],
    loading: true,
    showCreate: false,
    form: { agentId: '', changeType: 'prompt', newValue: '', split: 50 },
    async init() {
      try {
        const [testsRes, agentsRes] = await Promise.all([
          apiFetch('/api/ab-testing/variants/'),
          apiFetch('/api/agents/')
        ]);
        this.tests = testsRes.variants || testsRes.tests || [];
        this.agents = agentsRes.agents || [];
      } catch(e) { console.warn('A/B tests load:', e); }
      this.loading = false;
    },
    async createTest() {
      try {
        await apiFetch(`/api/ab-testing/${this.form.agentId}/create-variant/`, {
          method: 'POST',
          json: { changeType: this.form.changeType, newValue: this.form.newValue, split: this.form.split }
        });
        this.showCreate = false;
        window.vfToast('A/B test created', 'success');
        await this.init();
      } catch(e) { window.vfToast('Failed to create test', 'error'); }
    }
  };
}
</script>
{% endblock %}
