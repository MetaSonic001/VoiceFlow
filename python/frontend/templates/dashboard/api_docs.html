{% extends "base_dashboard.html" %}
{% block title %}API Documentation — VoiceFlow AI{% endblock %}
{% block content %}
<div class="mb-8">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold">API Documentation</h1>
      <p class="text-gray-500 text-sm mt-1">Interactive API reference powered by FastAPI's auto-generated OpenAPI docs</p>
    </div>
    <a href="{{ swagger_url }}" target="_blank" rel="noopener" class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
      Open in New Tab
    </a>
  </div>
</div>
<div class="bg-white rounded-xl border overflow-hidden" style="height:calc(100vh - 200px)">
  <iframe src="{{ swagger_url }}" class="w-full h-full border-0" title="FastAPI Swagger UI"></iframe>
</div>
{% endblock %}
