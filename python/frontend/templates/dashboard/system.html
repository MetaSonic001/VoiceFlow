{% extends "base_dashboard.html" %}
{% block title %}System Health — VoiceFlow AI{% endblock %}
{% block content %}
{% load json_tags %}
<div x-data="systemHealth()" x-init="refresh()" class="fade-in-up">
  <div class="mb-8 flex items-center justify-between">
    <div><h1 class="text-2xl font-bold bg-gradient-to-r from-gray-900 via-gray-700 to-gray-900 dark:from-white dark:via-gray-200 dark:to-white bg-clip-text text-transparent">System Health</h1><p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Monitor infrastructure and service status — auto-refreshes every 30s</p></div>
    <button @click="refresh()" class="vf-btn bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-lg shadow-teal-500/25 hover:from-teal-600 hover:to-cyan-600 text-sm px-4 py-2 rounded-lg">↻ Refresh</button>
  </div>
  <div class="grid md:grid-cols-4 gap-6 mb-8 stagger">
    <div class="vf-card p-5"><div class="text-sm text-gray-500 dark:text-gray-400">Uptime</div><div class="text-2xl font-bold text-green-600 mt-1" x-text="formatUptime(h.uptime_seconds)">—</div></div>
    <div class="vf-card p-5"><div class="text-sm text-gray-500 dark:text-gray-400">CPU Usage</div><div class="text-2xl font-bold mt-1 dark:text-white" x-text="(h.system?.cpu_percent??'—')+'%'">—</div><div class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-full mt-2"><div class="h-2 bg-blue-500 rounded-full transition-all" :style="'width:'+(h.system?.cpu_percent||0)+'%'"></div></div></div>
    <div class="vf-card p-5"><div class="text-sm text-gray-500 dark:text-gray-400">Memory</div><div class="text-2xl font-bold mt-1 dark:text-white" x-text="(h.system?.memory_percent??'—')+'%'">—</div><div class="text-xs text-gray-400 dark:text-gray-500" x-text="(h.system?.memory_used_gb||0)+' / '+(h.system?.memory_total_gb||0)+' GB'"></div><div class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-full mt-2"><div class="h-2 bg-purple-500 rounded-full transition-all" :style="'width:'+(h.system?.memory_percent||0)+'%'"></div></div></div>
    <div class="vf-card p-5"><div class="text-sm text-gray-500 dark:text-gray-400">Disk</div><div class="text-2xl font-bold mt-1 dark:text-white" x-text="(h.system?.disk_percent??'—')+'%'">—</div><div class="text-xs text-gray-400 dark:text-gray-500" x-text="(h.system?.disk_used_gb||0)+' / '+(h.system?.disk_total_gb||0)+' GB'"></div><div class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-full mt-2"><div class="h-2 bg-orange-500 rounded-full transition-all" :style="'width:'+(h.system?.disk_percent||0)+'%'"></div></div></div>
  </div>
  <div class="vf-card p-6">
    <h3 class="font-semibold mb-4 dark:text-white">Service Status</h3>
    <div class="grid md:grid-cols-2 gap-4">
      <template x-for="[name, info] in Object.entries(h.services || {})" :key="name">
        <div class="flex items-center gap-3 p-3 rounded-lg border dark:border-gray-700/50 transition dark:hover:bg-gray-800/30">
          <div class="w-3 h-3 rounded-full" :class="info.status==='healthy'?'bg-green-500':info.status==='degraded'?'bg-yellow-500':'bg-red-500'"></div>
          <span class="text-sm font-medium capitalize dark:text-white" x-text="name"></span>
          <span class="ml-auto text-xs px-2 py-0.5 rounded-full" :class="info.status==='healthy'?'vf-badge-success':info.status==='degraded'?'vf-badge-warning':'vf-badge-danger'" x-text="info.status"></span>
          <span class="text-xs text-gray-400 dark:text-gray-500" x-show="info.latency_ms!==undefined" x-text="info.latency_ms+'ms'"></span>
        </div>
      </template>
    </div>
  </div>
</div>
<script>
function systemHealth(){return{h:{{ health|safe_json }},
  async refresh(){try{const r=await fetch('/api/system/health-check/',{headers:{'X-CSRFToken':getCookie('csrftoken')}});if(r.ok)this.h=await r.json()}catch(e){}setTimeout(()=>this.refresh(),30000)},
  formatUptime(s){if(!s)return'—';const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60);return(d?d+'d ':'')+(h?h+'h ':'')+(m+'m')}}}
</script>
{% endblock %}
