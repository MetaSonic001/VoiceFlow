{% extends "base_dashboard.html" %}
{% block title %}Team Management — VoiceFlow AI{% endblock %}
{% block content %}
<div x-data="usersApp()" class="fade-in-up">
  <div class="flex items-center justify-between mb-8">
    <div><h1 class="text-2xl font-bold bg-gradient-to-r from-gray-900 via-gray-700 to-gray-900 dark:from-white dark:via-gray-200 dark:to-white bg-clip-text text-transparent">Team Management</h1><p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Manage users and roles</p></div>
    <button @click="showCreate=true;editUser={name:'',email:'',role:'user'}" class="vf-btn bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-lg shadow-teal-500/25 hover:from-teal-600 hover:to-cyan-600 px-4 py-2 text-sm font-medium rounded-lg">Add User</button>
  </div>
  <div class="vf-card">
    <table class="w-full text-sm">
      <thead class="bg-gray-50/80 dark:bg-gray-800/50"><tr class="text-left text-gray-500 dark:text-gray-400"><th class="px-4 py-3">Name</th><th class="px-4 py-3">Email</th><th class="px-4 py-3">Role</th><th class="px-4 py-3">Actions</th></tr></thead>
      <tbody>
        <template x-for="u in users" :key="u.id">
          <tr class="border-t dark:border-gray-700/50 hover:bg-gray-50 dark:hover:bg-gray-800/30 transition">
            <td class="px-4 py-3 font-medium dark:text-white" x-text="u.name || u.username"></td>
            <td class="px-4 py-3 text-gray-500 dark:text-gray-400" x-text="u.email"></td>
            <td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs" :class="u.role==='admin'?'vf-badge-warning':'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'" x-text="u.role || 'user'"></span></td>
            <td class="px-4 py-3 flex gap-2">
              <button @click="showCreate=true;editUser={...u};isEdit=true" class="vf-btn text-teal-600 dark:text-teal-400 hover:underline text-xs">Edit</button>
              <button @click="deleteUser(u)" class="vf-btn text-red-600 dark:text-red-400 hover:underline text-xs">Delete</button>
            </td>
          </tr>
        </template>
        <tr x-show="users.length===0"><td colspan="4" class="px-4 py-12 text-center text-gray-400 dark:text-gray-500">No team members yet.</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Create/Edit modal -->
  <div x-show="showCreate" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/40" @click.self="showCreate=false;isEdit=false">
    <div class="vf-card rounded-2xl p-6 w-full max-w-md shadow-xl">
      <h3 class="font-semibold text-lg mb-4 dark:text-white" x-text="isEdit ? 'Edit User' : 'Add User'"></h3>
      <div class="space-y-3">
        <div><label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Name</label><input x-model="editUser.name" class="w-full border dark:border-gray-700/50 rounded-lg px-3 py-2 text-sm dark:bg-gray-800 dark:text-white"></div>
        <div><label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Email</label><input x-model="editUser.email" type="email" class="w-full border dark:border-gray-700/50 rounded-lg px-3 py-2 text-sm dark:bg-gray-800 dark:text-white"></div>
        <div><label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Role</label>
          <select x-model="editUser.role" class="w-full border dark:border-gray-700/50 rounded-lg px-3 py-2 text-sm dark:bg-gray-800 dark:text-white">
            <option value="user">User</option><option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <div class="flex justify-end gap-3 mt-4">
        <button @click="showCreate=false;isEdit=false" class="vf-btn px-4 py-2 border dark:border-gray-700/50 rounded-lg text-sm dark:text-gray-300">Cancel</button>
        <button @click="saveUser()" class="vf-btn bg-gradient-to-r from-teal-500 to-cyan-500 text-white shadow-lg shadow-teal-500/25 hover:from-teal-600 hover:to-cyan-600 px-4 py-2 rounded-lg text-sm">Save</button>
      </div>
    </div>
  </div>
</div>
<script>
function usersApp(){
  return {
    users: {{ users_list|safe }},
    showCreate: false,
    isEdit: false,
    editUser: {name:'', email:'', role:'user'},
    async saveUser() {
      try {
        if (this.isEdit && this.editUser.id) {
          await apiFetch('/api/users/' + this.editUser.id + '/', {method:'PUT', json:this.editUser});
          const idx = this.users.findIndex(u=>u.id===this.editUser.id);
          if(idx>=0) this.users[idx] = {...this.editUser};
          showToast('User updated');
        } else {
          const d = await apiFetch('/api/users/', {method:'POST', json:this.editUser});
          this.users.push(d.user || d);
          showToast('User created');
        }
        this.showCreate=false; this.isEdit=false;
      } catch(e) { showToast('Failed: '+e.message,'error'); }
    },
    async deleteUser(u) {
      if (!confirm('Delete '+u.name+'?')) return;
      try {
        await apiFetch('/api/users/' + u.id + '/', {method:'DELETE'});
        this.users = this.users.filter(x=>x.id!==u.id);
        showToast('User deleted');
      } catch(e) { showToast('Failed','error'); }
    }
  }
}
</script>
{% endblock %}
