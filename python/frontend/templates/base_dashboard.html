{% extends "base.html" %}

{% block body %}
<div class="flex min-h-screen">
  <!-- Sidebar -->
  {% include "partials/sidebar.html" %}

  <!-- Main content -->
  <main class="flex-1 lg:ml-64">
    <div class="sticky top-0 z-20 backdrop-blur-sm bg-white/70 border-b border-slate-200/70">
      <div class="px-6 lg:px-8 h-14 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-[11px] tracking-wide uppercase text-slate-500">Workspace</span>
          <span class="h-4 w-px bg-slate-300"></span>
          <span class="text-sm font-semibold text-slate-700">VoiceFlow Platform</span>
        </div>
        <div class="flex items-center gap-2 text-xs text-slate-500">
          <span class="px-2 py-1 rounded-full bg-emerald-50 text-emerald-700 border border-emerald-200">System Online</span>
        </div>
      </div>
    </div>
    <div class="p-6 lg:p-8 max-w-[1800px]">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>
{% endblock %}
