{% extends "base.html" %}

{% block body %}
<div class="flex min-h-screen" x-data="darkMode()" x-init="init()" :class="dark ? 'dark' : ''">

  <!-- Sidebar -->
  {% include "partials/sidebar.html" %}

  <!-- Main content -->
  <main class="flex-1 lg:ml-64" :class="dark ? 'bg-slate-900 text-slate-100' : ''">

    <!-- Top bar -->
    <div class="sticky top-0 z-20 backdrop-blur-sm border-b"
         :class="dark ? 'bg-slate-900/80 border-slate-700' : 'bg-white/70 border-slate-200/70'">
      <div class="px-6 lg:px-8 h-14 flex items-center justify-between">

        <!-- Breadcrumb -->
        <div class="flex items-center gap-3">
          <span class="text-[11px] tracking-wide uppercase"
                :class="dark ? 'text-slate-400' : 'text-slate-500'">Workspace</span>
          <span class="h-4 w-px" :class="dark ? 'bg-slate-600' : 'bg-slate-300'"></span>
          <span class="text-sm font-semibold"
                :class="dark ? 'text-slate-200' : 'text-slate-700'">VoiceFlow Platform</span>
        </div>

        <!-- Right side controls -->
        <div class="flex items-center gap-3">

          <!-- Global search (HTMX-powered) -->
          <div class="relative hidden md:block">
            <input
              type="search"
              id="global-search"
              placeholder="Search agents, docs…"
              class="pl-9 pr-4 py-1.5 text-xs rounded-lg border outline-none w-52 focus:w-72 transition-all"
              :class="dark
                ? 'bg-slate-800 border-slate-600 text-slate-200 placeholder-slate-500 focus:border-teal-500'
                : 'bg-slate-50 border-slate-200 text-slate-700 placeholder-slate-400 focus:border-teal-500'"
              hx-get="/api/agents/?limit=5&search="
              hx-trigger="keyup changed delay:300ms"
              hx-target="#search-results"
              hx-swap="innerHTML"
              @input="document.querySelector('[hx-get]').setAttribute('hx-get', '/api/agents/?limit=5&search='+$event.target.value)"
            >
            <svg class="absolute left-2.5 top-2 w-3.5 h-3.5" :class="dark ? 'text-slate-500' : 'text-slate-400'"
                 fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <!-- Search dropdown -->
            <div id="search-results"
                 class="absolute top-full mt-1 left-0 w-72 rounded-xl border shadow-lg z-50 empty:hidden"
                 :class="dark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'">
            </div>
          </div>

          <!-- Notification bell -->
          <div class="relative" x-data="{ open: false, count: 0 }" x-init="fetchCount()">
            <button @click="open=!open"
                    class="relative p-2 rounded-lg transition"
                    :class="dark ? 'hover:bg-slate-800' : 'hover:bg-slate-100'">
              <svg class="w-5 h-5" :class="dark ? 'text-slate-300' : 'text-slate-600'"
                   fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
              </svg>
              <span x-show="count > 0" x-text="count"
                    class="absolute -top-1 -right-1 min-w-[18px] h-[18px] text-[10px] font-bold
                           bg-red-500 text-white rounded-full flex items-center justify-center px-1"></span>
            </button>

            <!-- Notification panel -->
            <div x-show="open" @click.outside="open=false" x-transition
                 class="absolute right-0 top-full mt-2 w-80 rounded-xl border shadow-xl z-50"
                 :class="dark ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'">
              <div class="p-3 border-b flex items-center justify-between"
                   :class="dark ? 'border-slate-700' : 'border-slate-100'">
                <span class="text-sm font-semibold" :class="dark ? 'text-slate-200' : 'text-slate-800'">Notifications</span>
                <a href="{% url 'notifications' %}"
                   class="text-xs text-teal-600 hover:underline">View all</a>
              </div>
              <div id="notif-panel"
                   hx-get="/api/notifications/?limit=5"
                   hx-trigger="revealed"
                   class="max-h-72 overflow-y-auto p-2">
                <p class="text-xs text-center py-4"
                   :class="dark ? 'text-slate-500' : 'text-slate-400'">Loading…</p>
              </div>
            </div>
          </div>

          <!-- Dark mode toggle -->
          <button @click="toggle()"
                  class="p-2 rounded-lg transition"
                  :class="dark ? 'hover:bg-slate-800 text-yellow-400' : 'hover:bg-slate-100 text-slate-600'"
                  :title="dark ? 'Switch to light mode' : 'Switch to dark mode'">
            <svg x-show="!dark" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
            <svg x-show="dark" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd"
                    d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.706a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/>
            </svg>
          </button>

          <!-- Status badge -->
          <span class="hidden sm:inline px-2 py-1 rounded-full text-xs border"
                :class="dark
                  ? 'bg-emerald-900/40 text-emerald-400 border-emerald-700'
                  : 'bg-emerald-50 text-emerald-700 border-emerald-200'">
            System Online
          </span>
        </div>
      </div>
    </div>

    <!-- Toast container (slides in from top-right) -->
    <div x-data="toastManager()" id="toast-root"
         class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 items-end"
         aria-live="polite">
      <template x-for="toast in toasts" :key="toast.id">
        <div x-show="toast.visible"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-x-8"
             x-transition:enter-end="opacity-100 translate-x-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-x-0"
             x-transition:leave-end="opacity-0 translate-x-8"
             class="flex items-start gap-3 px-4 py-3 rounded-xl border shadow-lg max-w-sm"
             :class="{
               'bg-white border-slate-200 text-slate-800': toast.type==='info',
               'bg-emerald-50 border-emerald-200 text-emerald-800': toast.type==='success',
               'bg-red-50 border-red-200 text-red-800': toast.type==='error',
               'bg-amber-50 border-amber-200 text-amber-800': toast.type==='warning',
             }">
          <span class="mt-0.5 text-sm" x-text="toast.icon"></span>
          <p class="text-sm font-medium flex-1" x-text="toast.message"></p>
          <button @click="dismiss(toast.id)" class="opacity-50 hover:opacity-100 text-xs ml-2">✕</button>
        </div>
      </template>
    </div>

    <!-- Page content -->
    <div class="p-6 lg:p-8 max-w-[1800px]">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

<script>
  function darkMode() {
    return {
      dark: localStorage.getItem('vf-dark') === 'true',
      init() {
        // Apply dark class on html element for Tailwind dark: variants
        if (this.dark) document.documentElement.classList.add('dark');
      },
      toggle() {
        this.dark = !this.dark;
        localStorage.setItem('vf-dark', this.dark);
        if (this.dark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      },
    };
  }

  function toastManager() {
    return {
      toasts: [],
      show(message, type = 'info') {
        const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
        const id = Date.now() + Math.random();
        this.toasts.push({ id, message, type, icon: icons[type] || 'ℹ️', visible: true });
        setTimeout(() => this.dismiss(id), 4000);
      },
      dismiss(id) {
        const t = this.toasts.find(t => t.id === id);
        if (t) t.visible = false;
        setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 300);
      },
    };
  }

  // Global helper — call window.vfToast('message', 'success') from anywhere
  window.vfToast = function(message, type = 'info') {
    const el = document.querySelector('#toast-root');
    if (el && el._x_dataStack) {
      el._x_dataStack[0].show(message, type);
    }
  };

  // Notification count fetcher
  function fetchCount() {
    fetch('/api/notifications/?unread_only=true&limit=1', {
      headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(r => r.json())
    .then(d => { this.count = d.unreadCount || 0; })
    .catch(() => {});
  }
</script>
{% endblock %}
