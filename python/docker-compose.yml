services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=voiceflow_prod
      - POSTGRES_USER=vf_admin
      - POSTGRES_PASSWORD=vf_secure_2025!
    ports:
      - "8010:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    networks:
      - voiceflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vf_admin -d voiceflow_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: voiceflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9020:9000"
      - "8070:9001"
    volumes:
      - minio_data:/data
    networks:
      - voiceflow-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8030:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - voiceflow-network
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000

  redis:
    image: redis:7-alpine
    ports:
      - "8020:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - voiceflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: voiceflow_kokoro
    ports:
      - "8880:8880"
    volumes:
      - kokoro_cache:/root/.cache
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8880/health || exit 1"]
      interval: 30s
      start_period: 60s
    networks:
      - voiceflow-network

  piper-tts:
    image: rhasspy/wyoming-piper:latest
    container_name: voiceflow_piper
    ports:
      - "8890:10200"
    volumes:
      - piper_voices:/data
    command: --voice en_US-lessac-medium --update-voices
    restart: unless-stopped
    networks:
      - voiceflow-network

  orpheus-llm:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: voiceflow_orpheus
    ports:
      - "8080:8080"
    volumes:
      - ./models/orpheus:/models
    command: >
      -m /models/orpheus-3b-gguf.gguf
      --host 0.0.0.0 --port 8080
      --ctx-size 4096 --n-predict 4096
      --rope-scaling linear
    restart: unless-stopped
    networks:
      - voiceflow-network

volumes:
  postgres_data:
  minio_data:
  chroma_data:
  redis_data:
  kokoro_cache:
  piper_voices:

networks:
  voiceflow-network:
    driver: bridge
